<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arth Mitra - Your Financial Guide</title>
    <meta name="description" content="Simulate financial life in India with Arth Mitra." />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                DEFAULT: '#6C4F3D', // Warm Brown
                light: '#8C6B56',
                dark: '#4A3427',
              },
              accent: {
                green: '#00A676',
                red: '#E25B5B',
                yellow: '#FFC93C',
                pink: '#FF8FA3',
              },
              neutral: {
                dark: '#262626',
                soft: '#666666',
                glass: 'rgba(255, 255, 255, 0.55)',
              },
              mint: {
                50: '#f0fdf9',
                100: '#ccfbf1',
              },
              peach: {
                50: '#fff5f2',
                100: '#ffe4e6',
              }
            },
            fontFamily: {
              sans: ['Outfit', 'sans-serif'],
            },
            fontSize: {
              'h1': ['28px', { lineHeight: '1.35', fontWeight: '700' }],
              'h2': ['22px', { lineHeight: '1.35', fontWeight: '700' }],
              'h3': ['18px', { lineHeight: '1.35', fontWeight: '600' }],
              'body': ['16px', { lineHeight: '1.35', fontWeight: '400' }],
              'caption': ['13px', { lineHeight: '1.35', fontWeight: '500' }],
            },
            borderRadius: {
              'card': '24px',
              'choice': '22px',
              'chip': '18px',
              'btn': '24px',
            },
            boxShadow: {
              'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.05)',
              'btn': '0 4px 14px rgba(0,0,0,0.12)',
              'btn-hover': '0 8px 18px rgba(0,0,0,0.16)',
            },
            animation: {
              'fade-in': 'fadeIn 0.5s ease-out',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          },
        },
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body { 
        font-family: 'Outfit', sans-serif; 
        color: #262626;
        background-color: #f0fdf9;
        background-image: linear-gradient(135deg, #f0fdf9 0%, #fff5f2 100%);
        background-attachment: fixed;
        min-height: 100vh;
      }
      
      /* Master UI Surfaces */
      .glass-card {
        background: rgba(255, 255, 255, 0.55);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.4);
      }

      .glass-choice {
        background: rgba(255, 255, 255, 0.65);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }

      /* Scrollbar utilities */
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",

    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0"
  }
}
</script>
</head>

    <div id="root"></div>
  </body>
</html>
